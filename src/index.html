<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Portfolio | Shah Zaman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #0062ff 0%, #00c6ff 100%); color: white; padding: 100px 0; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .tech-badge { background: #e9ecef; color: #495057; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; margin: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-3 fw-bold">Shah Zaman - The Automation King</h1>
            <p class="lead">DevOps Engineer in Training | Specialized in AWS & Docker</p>
            <div class="mt-4">
                <span class="tech-badge">Docker</span>
                <span class="tech-badge">AWS EC2</span>
                <span class="tech-badge">Linux</span>
                <span class="tech-badge">Git</span>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row text-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>CI/CD</h3>
                    <p>Automating builds with Jenkins & GitHub Actions.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Infrastructure</h3>
                    <p>Managing cloud resources on AWS Free Tier.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Automation</h3>
                    <p>Bash scripting for seamless deployments.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
